services:
  daemon:
    build: .
    # host networking is required for mDNS multicast (zeroconf _jibe._tcp.local.)
    # without it, Android discovery will not find the daemon
    network_mode: host
    restart: unless-stopped
    environment:
      # Override data dir so the volume mount is used instead of ~/.local/share/jibe
      XDG_DATA_HOME: /data
      # Optional: change the WebSocket port (default 8765)
      # JIBE_PORT: "8765"
      # Optional: disable TLS for development (not recommended)
      # JIBE_NO_TLS: "1"
    volumes:
      # Persist device database, TLS certificates, and dashboard recovery key
      - ${XDG_DATA_HOME:-${HOME}/.local/share}/jibe:/data/jibe

    # --- Optional device/socket mounts for additional features ---
    # Uncomment to enable presentation remote (requires ydotoold on host):
    # devices:
    #   - /dev/uinput:/dev/uinput

    # Uncomment to enable D-Bus notifications mirroring (Wayland/systemd user session):
    # volumes:
    #   - /run/user/1000/bus:/run/user/1000/bus

    # Note: clipboard sync (X11/Wayland) and tray icon are desktop-session features
    # and cannot be used in the standard headless Docker setup.
