<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jibe — Dashboard</title>
  <link rel="stylesheet" href="/web/css/theme.css" />
  <style>
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
    aside {
      border-right: 1px solid var(--border);
      padding: 1rem;
      background: var(--surface);
    }
    aside h2 { margin: 0 0 0.35rem; font-size: 1rem; }
    aside .sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 1rem; }
    aside nav a {
      display: block;
      padding: 0.45rem 0.55rem;
      border-radius: 6px;
      color: var(--muted);
      margin-bottom: 0.15rem;
    }
    aside nav a:hover { background: #21262d; color: var(--text); }
    aside nav a.active { background: #21262d; color: var(--accent); }
    main { padding: 1.25rem 1.5rem; overflow: auto; }
    main h1 { margin: 0 0 1rem; font-size: 1.25rem; }
    .row-detail { background: #0d1117; padding: 0.5rem 0.65rem; border-radius: 6px; margin-top: 0.35rem; font-size: 0.8rem; white-space: pre-wrap; max-height: 200px; overflow: auto; }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h2>Jibe</h2>
      <div class="sub mono" id="dash-version"></div>
      <div class="sub" id="dash-user"></div>
      <nav id="nav"></nav>
      <button type="button" class="btn btn-sm" style="margin-top:1rem;width:100%;" id="btn-logout">Logout</button>
    </aside>
    <main>
      <div id="view-root"></div>
    </main>
  </div>
  <script src="/web/js/auth.js"></script>
  <script>
    window.JibeAuth.redirectIfUnauthorized();
  </script>
  <script src="/web/js/api.js"></script>
  <script src="/web/js/app.js"></script>
</body>
</html>
